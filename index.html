<!DOCTYPE html>
<html lang="es" class="index-landing">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual - Ingreso - Profe Braian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap');
        
        :root {
            --card-dark-bg: rgba(15, 23, 42, 0.75);
            --header-light-bg: rgba(255, 255, 255, 0.98);
            --text-color: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.95);
            --input-text: #111827;
        }
        
        body { 
            font-family: 'Nunito', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            color: var(--text-color);
            position: relative;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow-x: hidden;
            background: transparent;
        }

        html.index-landing,
        body.index-landing {
            background: transparent !important;
        }

        body.index-landing::before {
            content: none;
        }

        body.index-landing {
            --landing-card-bg: rgba(255, 255, 255, 0.92);
            --landing-card-border: rgba(255, 188, 169, 0.55);
            --landing-header-bg:
                linear-gradient(135deg, rgba(255,255,255,0.98), rgba(255,245,235,0.97) 45%, rgba(236,251,255,0.96));
            --landing-title: #55425f;
            --landing-subtitle: #756579;
            --landing-shadow: 0 22px 42px rgba(232, 141, 124, 0.18);
        }

        body.index-landing.dark-mode {
            --landing-card-bg: rgba(19, 28, 58, 0.92);
            --landing-card-border: rgba(151, 175, 255, 0.22);
            --landing-header-bg:
                linear-gradient(180deg, rgba(255,251,248,0.99) 0%, rgba(255,244,236,0.98) 100%);
            --landing-title: #fff4ef;
            --landing-subtitle: #d7d9ea;
            --landing-shadow: 0 28px 48px rgba(7, 11, 27, 0.34);
        }

        #canvas-matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .theme-toggle {
            position: fixed; top: 20px; right: 20px;
            z-index: 3000; cursor: pointer; font-size: 28px;
            background: rgba(255,255,255,0.9); border: 2px solid rgba(255, 188, 169, 0.55); 
            border-radius: 50%; width: 50px; height: 50px;
            display: flex; justify-content: center; align-items: center;
            color: #6c5474;
            transition: all 0.3s;
            box-shadow: 0 12px 24px rgba(232, 141, 124, 0.18);
        }
        .theme-toggle:hover { transform: scale(1.08); background: rgba(255,251,247,0.98); }

        .glass-card {
            background: var(--card-dark-bg);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 0 0 24px 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%; max-width: 36rem;
            z-index: 10;
        }

        body.index-landing .glass-card {
            background: var(--landing-card-bg) !important;
            border: 1px solid var(--landing-card-border) !important;
            border-radius: 0 0 30px 30px !important;
            box-shadow: var(--landing-shadow) !important;
            backdrop-filter: blur(18px) !important;
            -webkit-backdrop-filter: blur(18px) !important;
        }

        .glass-header {
            background: var(--header-light-bg);
            border-radius: 24px 24px 0 0;
            padding: 20px 24px; 
            display: flex; justify-content: center; align-items: center;
            gap: 18px; 
            width: 100%; max-width: 36rem;
            box-shadow: 0 18px 28px rgba(232, 141, 124, 0.12);
            z-index: 11;
        }

        body.index-landing .glass-header {
            background: var(--landing-header-bg) !important;
            border: 1px solid var(--landing-card-border) !important;
            border-bottom: none !important;
            border-radius: 30px 30px 0 0 !important;
            padding: 22px 28px 18px !important;
            box-shadow: var(--landing-shadow) !important;
            position: relative;
            overflow: hidden;
        }

        body.index-landing .glass-header::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.22) 45%, transparent 75%);
            transform: translateX(-55%);
            pointer-events: none;
        }

        .logo-slot {
            width: min(100%, 420px);
            height: 175px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.42);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.45);
        }

        body.index-landing.dark-mode .logo-slot {
            background: rgba(255, 255, 255, 0.22);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
        }

        .glass-header img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(15,23,42,0.14));
        }

        body.index-landing h1 {
            color: var(--landing-title) !important;
            text-shadow: 0 6px 18px rgba(15, 23, 42, 0.12);
            font-family: 'Fredoka', sans-serif !important;
            font-weight: 700 !important;
        }

        body.index-landing p,
        body.index-landing label,
        body.index-landing .text-sky-100,
        body.index-landing .opacity-80 {
            color: var(--landing-subtitle) !important;
        }

        .input-style {
            background: rgba(255, 255, 255, 0.96);
            color: #55425f;
            border: 2px solid rgba(255, 196, 173, 0.65);
            border-radius: 22px !important;
            transition: all 0.3s;
        }
        .input-style:focus {
            border-color: #ff8ab2;
            outline: none;
            box-shadow: 0 0 0 5px rgba(255, 138, 178, 0.18);
            transform: translateY(-2px);
        }

        body.index-landing.dark-mode .input-style {
            background: rgba(255, 255, 255, 0.96);
            color: #43384e;
        }
    </style>
        <link rel="stylesheet" href="./shared/ui-theme.css">
</head>
<body class="p-6 index-landing">

    <canvas id="canvas-matrix"></canvas>

    <button class="theme-toggle" onclick="toggleTheme()" id="btnT">☀️</button>

    <div class="animate-fade-in flex flex-col items-center w-full max-w-xl relative z-10">
        
        <div class="glass-header">
            <div class="logo-slot">
                <img src="logo.png" alt="Logo institucional" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 320 150&quot;><rect width=&quot;320&quot; height=&quot;150&quot; rx=&quot;22&quot; fill=&quot;%23eff6ff&quot;/><rect x=&quot;12&quot; y=&quot;12&quot; width=&quot;296&quot; height=&quot;126&quot; rx=&quot;18&quot; fill=&quot;%23dbeafe&quot; stroke=&quot;%2393c5fd&quot; stroke-width=&quot;2&quot;/><text x=&quot;160&quot; y=&quot;68&quot; text-anchor=&quot;middle&quot; font-family=&quot;Arial&quot; font-size=&quot;28&quot; font-weight=&quot;700&quot; fill=&quot;%231e3a8a&quot;>AULA</text><text x=&quot;160&quot; y=&quot;102&quot; text-anchor=&quot;middle&quot; font-family=&quot;Arial&quot; font-size=&quot;28&quot; font-weight=&quot;700&quot; fill=&quot;%231e3a8a&quot;>VIRTUAL</text></svg>';">
            </div>
        </div>

        <div class="glass-card p-8 md:p-10 text-center">
            
            <div class="mb-8 md:mb-10">
                <h1 class="text-4xl md:text-5xl font-black drop-shadow-md mb-2">Aula Virtual</h1>
                <p class="text-lg md:text-xl font-bold opacity-80 text-sky-100">Informática Educativa</p>
            </div>
            
            <div class="space-y-6">
                
                <div class="text-left">
                    <label for="grado" class="block font-bold text-lg ml-1 mb-2">Elegí tu Nivel:</label>
                    <select id="grado" class="input-style w-full p-4 rounded-xl text-lg font-bold shadow-inner cursor-pointer">
                        <option value="" disabled selected>Selecciona tu grado/año...</option>
                        <optgroup label="Primaria">
                            <option value="1ro">1er Grado</option>
                            <option value="2do">2do Grado</option>
                            <option value="3ro">3er Grado</option>
                            <option value="4to">4to Grado</option>
                            <option value="5to">5to Grado</option>
                            <option value="6to">6to Grado</option>
                            <option value="7mo">7mo Grado</option>
                        </optgroup>
                        <optgroup label="Secundaria">
                            <option value="1sec">1er Año</option>
                            <option value="2sec">2do Año</option>
                        </optgroup>
                    </select>
                </div>

                <div class="text-left">
                    <label for="clave" class="block font-bold text-lg ml-1 mb-2">Palabra Secreta:</label>
                    <input type="password" id="clave" placeholder="••••••••" 
                        class="input-style w-full p-4 rounded-xl text-xl text-center font-bold shadow-inner tracking-widest">
                    <p class="text-sm opacity-80 mt-2 ml-1 text-center font-bold">Pista: Palabra de compu en minúsculas 🤫</p>
                </div>
                
                <button onclick="intentarIngreso()" 
                    class="w-full bg-pink-500 hover:bg-pink-600 text-white font-black py-4 rounded-xl text-xl shadow-lg transition transform hover:scale-105 active:scale-95 mt-4">
                    ¡ENTRAR AL AULA! 🚀
                </button>
            </div>
        </div>
    </div>

    <footer class="mt-8 text-center font-bold pb-2 opacity-70 relative z-10">
        <p>Diseñado por Profe Braian - 2026</p>
    </footer>

    <script>
        // --- EFECTO MATRIX ---
        const canvas = document.getElementById('canvas-matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const matrixChars = '01<>/{}[]'.split('');
        const fontSize = 18;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) { drops[x] = 1; }
        const colores = ['#38bdf8', '#f472b6', '#3b82f6'];
        function drawMatrix() {
            const isDark = document.body.classList.contains('dark-mode');
            ctx.fillStyle = isDark ? 'rgba(15, 23, 42, 0.22)' : 'rgba(240, 249, 255, 0.18)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillStyle = colores[Math.floor(Math.random() * colores.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        // --- MODO OSCURO / CLARO ---
        const btn = document.getElementById('btnT');
        if (localStorage.getItem('modo') === 'oscuro') { document.body.classList.add('dark-mode'); btn.innerHTML = '☀️'; }
        else { document.body.classList.remove('dark-mode'); btn.innerHTML = '🌙'; }
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            btn.innerHTML = isDark ? '☀️' : '🌙';
            localStorage.setItem('modo', isDark ? 'oscuro' : 'claro');
        }

        // --- SISTEMA DE ENLACES (ÍNDICE CENTRAL) ---
        // Aquí es donde todo se conecta. Cada grado tiene su clave y su archivo destino.
        const baseDeDatosGrados = {
            "1ro": { clave: "pantalla", archivoDestino: "primero/index1ro.html" },
            "2do": { clave: "juego", archivoDestino: "segundo/index2do.html" },
            "3ro": { clave: "mouse", archivoDestino: "tercero/index3ro.html" },
            "4to": { clave: "teclado", archivoDestino: "cuarto/index4to.html" },
            "5to": { clave: "robot", archivoDestino: "quinto/index5to.html" },
            "6to": { clave: "codigo", archivoDestino: "sexto/index6to.html" },
            "7mo": { clave: "pixel", archivoDestino: "septimo/index7mo.html" },
            "1sec": { clave: "hardware", archivoDestino: "primerosec/index1sec.html" },
            "2sec": { clave: "software", archivoDestino: "segundosec/index2sec.html" }
        };

        function intentarIngreso() {
            const gradoSeleccionado = document.getElementById('grado').value;
            const claveIngresada = document.getElementById('clave').value.toLowerCase().trim();
            
            if (gradoSeleccionado === "") { 
                alert("¡No te olvides de elegir tu nivel!"); 
                return; 
            }
            
            const datosDelGrado = baseDeDatosGrados[gradoSeleccionado];
            
            if (claveIngresada === datosDelGrado.clave) { 
                // Si la clave es correcta, abre el archivo correspondiente
                window.location.href = datosDelGrado.archivoDestino; 
            } else { 
                alert("❌ Palabra secreta incorrecta. Recordá que es todo en minúsculas."); 
                document.getElementById('clave').value = ''; 
                document.getElementById('clave').focus(); 
            }
        }

        document.getElementById('grado').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                intentarIngreso();
            }
        });

        document.getElementById('clave').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                intentarIngreso();
            }
        });
    </script>
        <script src="./shared/ui-theme.js" defer></script>
</body>
</html>
