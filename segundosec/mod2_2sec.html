<!DOCTYPE html>
<html lang="es">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #4db8ff 0%, #b8a4f5 50%, #f48fb1 100%);
            --card-bg: rgba(255, 255, 255, 0.4);
            --card-hover-bg: rgba(255, 255, 255, 0.6);
            --text-main: #2c3e50;
            --text-muted: #546e7a;
            --btn-bg: #ffffff;
            --btn-text: #1976d2;
            --topic-color: #1976d2;
        }

        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --card-bg: rgba(20, 30, 40, 0.5);
            --card-hover-bg: rgba(40, 50, 60, 0.7);
            --text-main: #f5f6fa;
            --text-muted: #dcdde1;
            --btn-bg: #2f3640;
            --btn-text: #4db8ff;
            --topic-color: #4db8ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 980px;
            width: 90%;
            margin: 60px auto 40px auto;
            position: relative;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .header-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            gap: 20px;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-icon {
            font-size: 4rem;
        }

        .header-text h3 {
            margin: 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .header-text h1 {
            margin: 5px 0;
            font-size: 2.2rem;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
            font-weight: 700;
        }

        .header-text p {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            width: 100%;
        }

        .menu-item,
        .menu-item-disabled {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 210px;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            background: var(--card-hover-bg);
        }

        .menu-item-disabled {
            opacity: 0.45;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(0.15);
        }

        .menu-icon {
            font-size: 4.5rem;
            margin-bottom: 20px;
        }

        .menu-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 10px 0;
        }

        .menu-desc {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--topic-color);
            margin: 0;
            line-height: 1.4;
        }

        .menu-note {
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            opacity: 0.75;
        }
    </style>
    <link rel="stylesheet" href="../shared/ui-theme.css">
</head>

                    <p>Elegí la clase para comenzar a trabajar</p>
                </div>
            </div>
            <a href="index2sec.html">← Menú principal</a>

        <div class="menu-grid">

            </a>

            <a href="clase2_turtle.html" class="menu-item">
                <div class="menu-icon">🎨</div>
                <h2 class="menu-title">Clase 2</h2>
                <p class="menu-desc">Colores, lineas y lapiz</p>
            </a>

            <div class="menu-item-disabled">
                <div class="menu-icon">🎨</div>
                <h2 class="menu-title">Clase 3</h2>
                <p class="menu-desc">Proyecto con Turtle</p>
                <p class="menu-note">Próximamente</p>
            </div>
        </div>
    </div>

    <script src="../shared/ui-theme.js" defer></script>
</body>
</html>
