<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundamentos y Entorno - 2do Año</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Variables por defecto (Modo Claro) */
        :root {
            --bg-gradient: linear-gradient(135deg, #4db8ff 0%, #b8a4f5 50%, #f48fb1 100%);
            --card-bg: rgba(255, 255, 255, 0.4);
            --card-hover-bg: rgba(255, 255, 255, 0.6);
            --text-main: #2c3e50;
            --text-muted: #546e7a;
            --btn-bg: #ffffff;
            --btn-text: #1976d2;
            --topic-color: #1976d2; /* Color para resaltar el nombre del tema */
        }

        /* Variables para el MODO OSCURO */
        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --card-bg: rgba(20, 30, 40, 0.5);
            --card-hover-bg: rgba(40, 50, 60, 0.7);
            --text-main: #f5f6fa;
            --text-muted: #dcdde1;
            --btn-bg: #2f3640;
            --btn-text: #4db8ff;
            --topic-color: #4db8ff;
        }

        body {
            margin: 0; padding: 0; font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient); background-attachment: fixed;
            color: var(--text-main); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            transition: background 0.5s ease, color 0.5s ease;
        }

        .container { max-width: 900px; width: 90%; margin: 60px auto 40px auto; position: relative;}

        /* BOTÓN MODO OSCURO */
        .theme-toggle {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.8); border: none; border-radius: 30px;
            padding: 10px 20px; font-size: 1rem; font-weight: 700; font-family: 'Quicksand', sans-serif;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; gap: 8px; color: #2c3e50;
            transition: 0.3s; z-index: 1000;
        }
        .theme-toggle:hover { transform: scale(1.05); }

        /* HEADER */
        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 20px; padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
            transition: background 0.5s ease;
        }

        .header-card { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px;}
        .header-content { display: flex; align-items: center; gap: 20px; }
        .header-icon { font-size: 4rem; }
        .header-text h3 { margin: 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700; }
        .header-text h1 { margin: 5px 0; font-size: 2.2rem; color: #ffffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); font-weight: 700; }
        .header-text p { margin: 0; font-size: 1.1rem; font-weight: 600; }

        .btn-volver {
            background: var(--btn-bg); color: var(--btn-text); text-decoration: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s, background 0.3s, color 0.3s;
        }
        .btn-volver:hover { transform: translateY(-2px); }

        /* GRILLA DEL SUBMENÚ */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 100%;
        }

        .menu-item {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            background: var(--card-hover-bg);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .menu-icon {
            font-size: 4.5rem;
            margin-bottom: 20px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.3s;
        }

        .menu-item:hover .menu-icon {
            transform: scale(1.1);
        }

        .menu-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: var(--text-main);
        }

        .menu-desc {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--topic-color); /* Agregué una variable para que el subtítulo resalte más */
            margin: 0;
            line-height: 1.4;
        }

    </style>
</head>
<body>

    <button class="theme-toggle" id="btn-tema" aria-label="Cambiar tema">🌙 Modo Oscuro</button>

    <div class="container">
        
        <header class="glass-card header-card">
            <div class="header-content">
                <div class="header-icon">⚙️</div>
                <div class="header-text">
                    <h3>1° Cuatrimestre - Bases de Python</h3>
                    <h1>Fundamentos y Entorno</h1>
                    <p>Elige la clase para comenzar a trabajar</p>
                </div>
            </div>
            <a href="index2sec.html" class="btn-volver">⬅ Menú Principal</a>
        </header>

        <div class="menu-grid">
            
            <a href="clase1_drive.html" class="menu-item">
                <div class="menu-icon">📁</div>
                <h2 class="menu-title">Clase 1</h2>
                <p class="menu-desc">Cuenta institucional y bienvenida</p>
            </a>

            <a href="clase1_programacion.html" class="menu-item">
                <div class="menu-icon">🧠</div>
                <h2 class="menu-title">Clase 2</h2>
                <p class="menu-desc">Intro a la Programación</p>
            </a>

            <a href="clase2_programacion.html" class="menu-item">
                <div class="menu-icon">🤖</div>
                <h2 class="menu-title">Clase 3</h2>
                <p class="menu-desc">Algoritmos y Python</p>
            </a>

        </div>

    </div>

    <script>
        const btnTema = document.getElementById('btn-tema');
        
        btnTema.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            
            if (document.body.classList.contains('dark-mode')) {
                btnTema.innerHTML = '☀️ Modo Claro';
                btnTema.style.background = 'rgba(0, 0, 0, 0.5)';
                btnTema.style.color = '#fff';
            } else {
                btnTema.innerHTML = '🌙 Modo Oscuro';
                btnTema.style.background = 'rgba(255, 255, 255, 0.8)';
                btnTema.style.color = '#2c3e50';
            }
        });
    </script>
</body>
</html>
