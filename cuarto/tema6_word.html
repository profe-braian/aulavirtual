<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidad Word - 4to Grado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap');

        :root {
            --fondo-gradiente: linear-gradient(135deg, #0ea5e9 0%, #2563eb 45%, #22c55e 100%);
            --tarjeta-bg: rgba(255, 255, 255, 0.16);
            --tarjeta-hover: rgba(255, 255, 255, 0.22);
            --border-color: rgba(255, 255, 255, 0.28);
            --header-bg: rgba(255, 255, 255, 0.1);
            --texto-principal: #ffffff;
        }

        .dark-mode {
            --fondo-gradiente: linear-gradient(135deg, #082f49 0%, #172554 45%, #14532d 100%);
            --tarjeta-bg: rgba(0, 0, 0, 0.35);
            --tarjeta-hover: rgba(0, 0, 0, 0.45);
            --border-color: rgba(255, 255, 255, 0.12);
            --header-bg: rgba(0, 0, 0, 0.35);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Quicksand', sans-serif;
            background: var(--fondo-gradiente);
            background-attachment: fixed;
            color: var(--texto-principal);
            transition: background 0.4s ease;
        }

        .glass-panel {
            background: var(--tarjeta-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(14px);
            border-radius: 24px;
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.2);
        }

        .card-hover {
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
        }

        .card-hover:hover {
            transform: translateY(-8px);
            background: var(--tarjeta-hover);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            cursor: pointer;
            font-size: 28px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            transition: transform 0.3s, background 0.3s;
        }

        .theme-toggle:hover {
            transform: scale(1.08);
            background: rgba(255,255,255,0.35);
        }

        .fade-up {
            animation: fadeUp 0.8s forwards;
            opacity: 0;
            transform: translateY(28px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
        <link rel="stylesheet" href="../shared/ui-theme.css">
</head>
<body class="p-4 md:p-8">

    <button class="theme-toggle shadow-lg" onclick="toggleTheme()" id="btnT">☀️</button>

    <div class="max-w-6xl mx-auto pt-10 md:pt-4">
        <header class="glass-panel p-8 md:p-10 mb-12 flex flex-col md:flex-row justify-between items-center text-center md:text-left gap-6 fade-up bg-[var(--header-bg)]">
            <div class="flex items-center gap-5">
                <span class="text-7xl drop-shadow-md">📝</span>
                <div>
                    <h1 class="text-4xl md:text-5xl font-black">Unidad: Microsoft Word</h1>
                    <p class="text-xl font-bold text-sky-200 mt-2">Elegí la clase que querés trabajar hoy</p>
                </div>
            </div>
            <a href="index4to.html" class="bg-white text-blue-900 font-black px-8 py-4 rounded-xl hover:bg-gray-100 transition shadow-lg text-lg">
                ← Volver al Menú
            </a>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <a href="clase1_word_4to.html" class="glass-panel p-10 text-center card-hover border-2 border-transparent hover:border-emerald-300 fade-up" style="animation-delay: 0.15s;">
                <span class="text-8xl block mb-6 drop-shadow-lg">📄</span>
                <h2 class="text-3xl font-black mb-2">Clase 1</h2>
                <p class="text-emerald-200 font-bold text-xl">Introducción a Word</p>
                <p class="mt-4 text-base font-bold opacity-90">Teoría, ejercicios y práctica interactiva.</p>
            </a>

            <div class="glass-panel p-10 text-center border-2 border-dashed border-white/30 fade-up opacity-80" style="animation-delay: 0.25s;">
                <span class="text-8xl block mb-6">⌨️</span>
                <h2 class="text-3xl font-black mb-2">Clase 2</h2>
                <p class="text-sky-200 font-bold text-xl">Próximamente</p>
                <p class="mt-4 text-base font-bold opacity-80">Formato de texto y herramientas básicas.</p>
            </div>

            <div class="glass-panel p-10 text-center border-2 border-dashed border-white/30 fade-up opacity-80" style="animation-delay: 0.35s;">
                <span class="text-8xl block mb-6">🎨</span>
                <h2 class="text-3xl font-black mb-2">Clase 3</h2>
                <p class="text-sky-200 font-bold text-xl">Próximamente</p>
                <p class="mt-4 text-base font-bold opacity-80">Imágenes, títulos y diseño simple.</p>
            </div>
        </section>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const esOscuro = document.body.classList.contains('dark-mode');
            document.getElementById('btnT').textContent = esOscuro ? '🌙' : '☀️';
            localStorage.setItem('modo', esOscuro ? 'oscuro' : 'claro');
        }

        if (localStorage.getItem('modo') === 'oscuro') {
            document.body.classList.add('dark-mode');
            document.getElementById('btnT').textContent = '🌙';
        }
    </script>
        <script src="../shared/ui-theme.js" defer></script>
</body>
</html>
